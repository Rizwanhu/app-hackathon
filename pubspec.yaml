name: sme_dashboard
description: "SME Cash Flow Intelligence Dashboard for SOFTEC '25"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- Backend & Database ---
  supabase_flutter: ^2.6.0

  # --- Image Scanning & Camera ---
  google_ml_kit: ^0.19.0
  image_picker: ^1.1.2

  # --- State Management (The Brain) ---
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # --- AI & External Tools ---
  google_generative_ai: ^0.4.3
  url_launcher: ^6.3.1
  
  # --- Extra Tools for a Winning App ---
  intl: ^0.19.0            # Paison aur dates ko format karne ke liye
  fl_chart: ^0.68.0        # Khoobsurat graphs dikhane ke liye

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # Agar aap images use karenge to yahan assets folder add hoga
  # assets:
  #   - assets/images/