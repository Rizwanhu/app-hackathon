name: sme_dashboard
description: "A new Flutter project for the hackathon."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.6.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Architecture / State / Navigation
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  go_router: ^16.0.0


  # Backend / AI
  supabase_flutter: ^2.6.0
  flutter_dotenv: ^5.1.0
  google_generative_ai: ^0.4.7

  # UI / Charts / Utils
  fl_chart: ^1.1.0
  intl: ^0.20.2
  url_launcher: ^6.3.2
  
  # Hackathon Polish
  flutter_spinkit: ^5.1.0
  flutter_animate: ^4.5.0

  # Image Scanning, Camera & Printing
  google_ml_kit: ^0.19.0
  image_picker: ^1.1.2
  pdf: ^3.12.0
  printing: ^5.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env


dependency_overrides:
  fl_chart: 0.69.0