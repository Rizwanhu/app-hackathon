plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "com.example.sme_dashboard"
    compileSdk = 36 // Manually setting to 36 for better compatibility
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        applicationId = "com.example.sme_dashboard"
        minSdkVersion flutter.minSdkVersion
        targetSdk 36
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    buildTypes {
        release {
            signingConfig = signingConfigs.debug
        }
    }

    // 👇 IS BLOCK SE VERSION MISMATCH WALA ERROR KHATAM HO JAYE GA
    configurations.all {
        resolutionStrategy {
            force 'androidx.browser:browser:1.8.0'
            force 'androidx.activity:activity:1.9.0'
            force 'androidx.core:core:1.13.0'
            force 'androidx.core:core-ktx:1.13.0'
        }
    }
}

flutter {
    source = "../.."
}
